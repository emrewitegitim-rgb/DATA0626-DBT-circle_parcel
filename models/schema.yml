
version: 2

sources:
    - name: raw
      schema: raw_data_circle
      description: "Schema for circle dataset"
      tables:
          - name: parcel
            identifier: raw_cc_parcel
            description: "parcel details"
            columns:
              - name: Parcel_id
                description: "id of the parcel"
                tests:
                  - not_null
                  - unique
          - name: product
            identifier: raw_cc_parcel_product
            description: "product details in a parcel"
            columns:
              - name: ParCEL_id
                description: "id of the parcel"
                tests:
                  - not_null
                  
             


